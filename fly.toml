# fly.toml app configuration file generated for easy-product-recommendations-bold-waterfall-5151 on 2026-03-09T15:56:05+11:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'easy-product-recommendations-bold-waterfall-5151'
primary_region = 'syd'

[build]

[env]
  PORT = '3000'
  SCOPES = 'write_metaobject_definitions,write_products'
  SHOPIFY_API_KEY = 'd3c0cbf098724f9889fd29eefdbce6e2'
  SHOPIFY_APP_URL = 'https://easy-product-recommendations.fly.dev'

[processes]
  app = 'node ./dbsetup.js npm run docker-start'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
